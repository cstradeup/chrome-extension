<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CSTradeUp Inventory Helper</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial, sans-serif; width: 360px; padding: 12px; }
    label { display:block; margin-top:8px; font-size:12px; color:#333; }
    input, textarea { width:100%; box-sizing:border-box; padding:6px; }
    button { margin-top:8px; padding:8px 12px; width:100%; }
    #status { margin-top:8px; font-size:12px; color:#666; }
    .row { display:flex; gap:8px; align-items:center; }
    .flex { flex:1; }
  </style>
</head>
<body class="popup-card max-w-sm mx-auto" >

  <h1 class="text-xl font-semibold mb-2">CSTradeUp Inventory Helper</h1>

  <label>Last Updated:</label>
  <span id="lastUpdated" ></span>

  <button id="start" class="px-3 py-1 rounded bg-blue-600 text-white hover:bg-blue-700" >Update Inventory</button>
  <div id="status" class="mt-2 text-sm text-gray-700"></div>

  <button id="start_inventory_history" class="px-3 py-1 rounded bg-blue-600 text-white hover:bg-blue-700" >Update Inventory History</button>
  <div id="status_inventory_history" class="mt-2 text-sm text-gray-700"></div>

  <a href="http://localhost:3000/account" target="_blank" >View Inventory</a>

  <script src="popup.bundle.js"></script>
</body>
</html>
